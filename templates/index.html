<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Pass/Fail Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="header">
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"
               viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </div>
        <h1>Student Prediction System</h1>
        <p>Predict Academic Outcome Using Machine Learning</p>
      </div>
      <form method="POST" action="/">
        <div class="form-group">
          <label for="study_hours">Study Hours per Day</label>
          <input type="number" id="study_hours" name="study_hours" required>
        </div>

        <div class="form-group">
          <label for="attendance">Attendance Percentage</label>
          <input type="number" id="attendance" name="attendance" required>
        </div>

        <div class="form-group">
          <label for="previous_marks">Previous Marks</label>
          <input type="number" id="previous_marks" name="previous_marks" required>
        </div>

        <button type="submit" class="submit-btn">Predict Result</button>
      </form>

      {% if prediction %}
        <div class="result">
          {{ prediction }}
        </div>
      {% endif %}

    </div>
  </div>
</body>
</html>
